[registry]
base_url = "https://ioa.pub/registry"
# TODO: 目前仅用于 entity derive 等 mTLS 场景，先与 base_url 保持同域占位。
mtls_base_url = "https://ioa.pub/registry"

[auth]
user_token_file = "./.acps-cli/tokens/registry-user.json"
admin_token_file = "./.acps-cli/tokens/registry-admin.json"

[ca]
base_url = "https://ioa.pub/ca-server"

[discovery]
base_url = "https://ioa.pub/discovery"

[mq]
# mq-auth-server Group API（群组 ACL 管理）
group_api_url = "https://ioa.pub:9007"
# mq-auth-server Auth API（鉴权探测）
# 你当前只给了 9007，这里先保持同地址；若平台单独开放 9008，再改为 9008。
auth_api_url = "https://ioa.pub:9007"
